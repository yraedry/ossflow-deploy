services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ossflow
      POSTGRES_USER: ossflow
      POSTGRES_PASSWORD: ossflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ossflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../OssFlow
      dockerfile: Dockerfile
    image: ossflow-backend:dev
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75"
      POSTGRES_HOST: postgres
      POSTGRES_DB: ossflow
      POSTGRES_USER: ossflow
      POSTGRES_PASSWORD: ossflow
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ../OssFlow-frontend
      dockerfile: Dockerfile
    image: ossflow-frontend:dev
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
